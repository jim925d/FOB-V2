services:
  - type: web
    name: skillbridge-api
    runtime: docker
    plan: starter
    healthCheckPath: /
    rootDir: skillbridge-api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillbridge-db
          property: connectionString
      - key: GEOCODING_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://thefob.com","https://www.thefob.com","https://fob-sigma.vercel.app"]'

databases:
  - name: skillbridge-db
    plan: free
    databaseName: skillbridge
    postgresMajorVersion: "16"
